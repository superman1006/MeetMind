# 本地单节点 PostgreSQL（含 pgvector 扩展），供 MeetMind 做 RAG 存储 + 混合检索使用。
#
# 用 pgvector/pgvector 官方镜像（= 官方 postgres + 预装 vector 扩展），
# 这样向量 kNN（pgvector）和关键字召回（pg_trgm，contrib 自带）都开箱即用。
#
# 启动:    docker compose up -d
# 健康:    docker exec meetmind-pg pg_isready -U meetmind
# 连接:    psql postgresql://meetmind:meetmind@localhost:5433/meetmind
#          (宿主机 5432 常被本地原生 postgres 占用，这里映射到 5433 避让)
# 停止:    docker compose down            (保留数据)
# 抹库:    docker compose down -v         (连数据卷一起删，会触发下次启动重灌种子)

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: meetmind-pg
    environment:
      POSTGRES_USER: meetmind
      POSTGRES_PASSWORD: meetmind
      POSTGRES_DB: meetmind
    ports:
      # 宿主机 5433 → 容器 5432，避开本机原生 postgres 占用的 5432
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmind -d meetmind"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pg_data:
    driver: local
